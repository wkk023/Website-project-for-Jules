steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/fire-inspection-system:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fire-inspection-system:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fire-inspection-system'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fire-inspection-system:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DATABASE_URL},JWT_SECRET=${_JWT_SECRET}'
      # If using Cloud SQL, add instances here:
      # - '--add-cloudsql-instances'
      # - '${_CLOUD_SQL_CONNECTION_NAME}'

images:
  - 'gcr.io/$PROJECT_ID/fire-inspection-system:$COMMIT_SHA'

substitutions:
  _DATABASE_URL: ''
  _JWT_SECRET: 'default-secret-replace-me'

options:
  logging: CLOUD_LOGGING_ONLY
